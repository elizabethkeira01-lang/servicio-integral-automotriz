<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Portal Cristian</title><link rel="stylesheet" href="styles.css"></head><body><main class="portal-main"><section class="card"><h1>Portal de Cristian</h1><p>Agenda, clientes, vehículos, presupuestos y avances.</p><div id="loginBox"><input id="password" type="password" placeholder="Contraseña"><button onclick="login()">Entrar</button><p id="loginMsg" class="mensaje"></p></div><div id="portal" style="display:none;"><div class="tabs"><button onclick="mostrarTab('citas')">Citas</button><button onclick="mostrarTab('clientes')">Clientes</button><button onclick="mostrarTab('vehiculos')">Vehículos</button></div><div id="tab-citas"><div class="toolbar"><input id="buscar" placeholder="Buscar por nombre, teléfono, folio o placas" oninput="cargarCitas()"><button onclick="cargarCitas()">Actualizar</button></div><div id="listaCitas"></div></div><div id="tab-clientes" style="display:none;"><button onclick="cargarClientes()">Actualizar clientes</button><div id="listaClientes"></div></div><div id="tab-vehiculos" style="display:none;"><button onclick="cargarVehiculos()">Actualizar vehículos</button><div id="listaVehiculos"></div></div></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="portal.js"></script></body></html>
